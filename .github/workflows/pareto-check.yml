name: Pareto support check

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::testthat
      - name: Install package
        run: R CMD INSTALL .
      - name: Run Pareto regression tests
        run: Rscript -e 'testthat::test_file("tests/testthat/test_paretoI.R")'
